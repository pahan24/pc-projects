<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SASA MD — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <span class="nav-brand">⚡ SASA MD</span>
  <div class="nav-links">
    <a href="/pair">Pair</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/coins">Economy</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>
<div class="container">
  <div class="page-header">
    <div class="page-title">📊 Dashboard</div>
    <div class="page-sub" id="bot-name-sub">Loading...</div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="card stat-card"><div class="stat-value" id="s-users">—</div><div class="stat-label">Total Users</div></div>
    <div class="card stat-card"><div class="stat-value" id="s-coins">—</div><div class="stat-label">Total Coins</div></div>
    <div class="card stat-card"><div class="stat-value" id="s-cmds">—</div><div class="stat-label">Commands Run</div></div>
    <div class="card stat-card">
      <div class="stat-value" id="s-status" style="font-size:1.5rem">—</div>
      <div class="stat-label">Bot Status</div>
    </div>
  </div>

  <div class="row">
    <!-- Settings -->
    <div class="col">
      <div class="card">
        <h3 style="color:var(--neon);margin-bottom:16px">⚙️ Bot Settings</h3>
        <div class="toggle-wrap">
          <span>Mode</span>
          <select id="mode-select" onchange="saveSetting('mode', this.value)" style="width:auto;padding:6px 12px">
            <option value="public">🌐 Public</option>
            <option value="private">🔒 Private</option>
          </select>
        </div>
        <div class="toggle-wrap">
          <span>Prefix</span>
          <input type="text" id="prefix-input" style="width:60px;text-align:center;padding:6px" maxlength="3" onchange="saveSetting('prefix', this.value)">
        </div>
        <div id="toggles"></div>
        <button class="btn btn-danger" onclick="restartBot()" style="width:100%;margin-top:16px">🔄 Restart Bot</button>
      </div>
    </div>
    <!-- Top Commands -->
    <div class="col">
      <div class="card">
        <h3 style="color:var(--neon);margin-bottom:16px">🏆 Top Commands</h3>
        <table>
          <thead><tr><th>#</th><th>Command</th><th>Uses</th></tr></thead>
          <tbody id="top-cmds"></tbody>
        </table>
      </div>
      <!-- Reaction Packs -->
      <div class="card">
        <h3 style="color:var(--neon);margin-bottom:16px">🎭 Reaction Packs</h3>
        <div id="packs-list"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/common.js"></script>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
requireAuth();
let currentSettings = {};

async function loadDashboard() {
  const data = await authFetch('/api/dashboard');
  if (!data) return;
  currentSettings = data.settings || {};
  document.getElementById('s-users').textContent = data.totalUsers || 0;
  document.getElementById('s-coins').textContent = (data.totalCoins || 0).toLocaleString();
  document.getElementById('s-cmds').textContent = (data.totalCommands || 0).toLocaleString();

  // Mode/prefix
  document.getElementById('mode-select').value = currentSettings.mode || 'public';
  document.getElementById('prefix-input').value = currentSettings.prefix || '.';

  // Feature toggles
  const toggleFeatures = [
    ['autoRead','Auto Read'],['autoTyping','Auto Typing'],
    ['antiLink','Anti Link'],['antiBadWord','Anti Bad Word'],
    ['welcomeMsg','Welcome Message'],['goodbyeMsg','Goodbye Message'],['rejectCalls','Reject Calls']
  ];
  document.getElementById('toggles').innerHTML = toggleFeatures.map(([k, label]) => `
    <div class="toggle-wrap">
      <span>${label}</span>
      <label class="toggle">
        <input type="checkbox" ${currentSettings[k] ? 'checked' : ''} onchange="saveSetting('${k}', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
  `).join('');

  // Top commands
  document.getElementById('top-cmds').innerHTML = (data.topCmds || []).map(([cmd, count], i) =>
    `<tr><td>${i+1}</td><td>.${cmd}</td><td>${count}</td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:var(--text2)">No data</td></tr>';

  // Reaction packs
  document.getElementById('packs-list').innerHTML = (data.packs || []).map(p => `
    <div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span><strong>${p.name}</strong> (${p.id})</span>
        <span style="color:var(--neon)">${p.cost} 🪙</span>
      </div>
      <div style="color:var(--text2);font-size:.8rem;margin-top:4px">${p.emojis.join(' ')} | ${p.interval}s | ${p.duration}min</div>
    </div>
  `).join('') || '<p style="color:var(--text2)">No packs</p>';
}

async function saveSetting(key, value) {
  const res = await authFetch('/api/settings', 'POST', { key, value });
  if (res?.success) toast(`✅ ${key} updated`, 'success');
  else toast('Failed to save', 'error');
}

async function restartBot() {
  if (!confirm('Restart bot now?')) return;
  await authFetch('/api/restart', 'POST');
  toast('🔄 Bot restarting...', 'success');
}

// Bot status
async function updateStatus() {
  const res = await authFetch('/api/status');
  if (!res) return;
  document.getElementById('bot-name-sub').textContent = `${res.botName} v${res.version} | Owner: ${res.owner}`;
  const el = document.getElementById('s-status');
  el.textContent = res.online ? '🟢' : '🔴';
}

// Live socket updates
const socket = io();
socket.on('stats', data => {
  document.getElementById('s-users').textContent = data.users;
  document.getElementById('s-coins').textContent = data.coins.toLocaleString();
  document.getElementById('s-cmds').textContent = data.commands.toLocaleString();
});

loadDashboard(); updateStatus();
setInterval(updateStatus, 10000);

function logout() { localStorage.removeItem('sasa_token'); window.location.href = '/login'; }
</script>
</body>
</html>
